name: Change Request (CR)
description: Raise a formal change request for production
title: "[CR] "
labels: ["CR:New"]
body:
  - type: markdown
    attributes:
      value: |
        ## Change Request
        Fill in all fields. This issue will be reviewed and approved before any development begins.

  - type: input
    id: requested_by
    attributes:
      label: Requested By
      description: Full name of the person requesting this change
      placeholder: e.g. Lohith Kumar
    validations:
      required: true

  - type: dropdown
    id: source
    attributes:
      label: Source
      description: How was this request received?
      options:
        - Source:Internal
        - Source:Email
        - Source:WhatsApp
        - Source:Call
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Type of Change
      options:
        - Type:Bug
        - Type:Enhancement
        - Type:DataFix
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs to be changed and why?
      placeholder: Describe the change in detail...
    validations:
      required: true

  - type: textarea
    id: justification
    attributes:
      label: Business Justification
      description: Why is this change needed? What problem does it solve?
      placeholder: Business reason for this change...
    validations:
      required: true
