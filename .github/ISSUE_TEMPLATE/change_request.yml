name: Change Request (CR)
description: Raise a formal change request for production
title: "[CR] "
labels: ["CR:New"]
body:
  - type: markdown
    attributes:
      value: |
        ## Change Request
        Fill in all fields. This issue will be reviewed and approved before any development begins.

  - type: input
    id: requested_by
    attributes:
      label: Requested By
    validations:
      required: true

  - type: dropdown
    id: source
    attributes:
      label: Source
      options:
        - Internal
        - Email
        - WhatsApp
        - Call
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Type of Change
      options:
        - Bug
        - Enhancement
        - Data Fix
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
    validations:
      required: true

  - type: textarea
    id: justification
    attributes:
      label: Business Justification
      placeholder: Why is this needed?
    validations:
      required: true


  - type: input
    id: deployment_date
    attributes:
      label: Target Deployment Date
      placeholder: YYYY-MM-DD

