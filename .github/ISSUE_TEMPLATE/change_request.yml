name: Change Request (CR)
description: Raise a formal change request for production
labels: ["CR:New"]
body:
  - type: markdown
    attributes:
      value: "## Change Request"

  - type: input
    id: requested_by
    attributes:
      label: Requested By
    validations:
      required: true

  - type: dropdown
    id: source
    attributes:
      label: Source
      options:
        - Internal
        - Email
        - WhatsApp
        - Call
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Type of Change
      options:
        - Bug
        - Enhancement
        - Data Fix
    validations:
      required: true

  - type: input
    id: email_subject
    attributes:
      label: Email Subject
      placeholder: Paste the email subject line here (if request came via email)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
    validations:
      required: true




