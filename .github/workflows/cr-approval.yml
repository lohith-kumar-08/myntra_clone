name: CR Approval Control

on:
  issues:
    types: [labeled, unlabeled]

jobs:
  handle-cr-label:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Handle CR Label Changes
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const AUTHORIZED_USERS = ['lohith-kumar-08'];
            const CR_LABELS = ['CR:New', 'CR:Approved', 'CR:In Progress', 'CR:Done', 'CR:Deployed', 'CR:Hold', 'CR:Rejected'];
            const FORWARD_ORDER = ['CR:New', 'CR:Approved', 'CR:In Progress', 'CR:Done', 'CR:Deployed'];
            const APPROVER_ONLY = ['CR:Approved', 'CR:Rejected', 'CR:Hold'];

            const actor = context.payload.sender.login;
            const label = context.payload.label.name;
            const action = context.payload.action;
            const issueNumber = context.payload.issue.number;
            const issueTitle = context.payload.issue.title;
            const now = new Date().toISOString().split('T')[0];

            // Only handle CR labels
            if (!CR_LABELS.includes(label)) return;

            // Fetch current labels upfront
            const issueData = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber
            });
            const currentLabels = issueData.data.labels.map(l => l.name);

            // ── Handle UNLABELED event — someone removed a label ──
            if (action === 'unlabeled') {
              // CR:New removal is fine (happens automatically on approval)
              if (label === 'CR:New') return;

              // Block removal of any other CR label by anyone
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: [label]
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `⛔ @${actor} Removing the \`${label}\` label directly is not allowed.\n\nUse the correct label to transition the CR status.\n\nAllowed flow: \`CR:New\` → \`CR:Approved\` → \`CR:In Progress\` → \`CR:Done\` → \`CR:Deployed\`\n\nTo pause: use \`CR:Hold\`. To cancel: use \`CR:Rejected\`.`
              });
              return;
            }

            // ── Handle LABELED event — someone added a label ──

            // Get the previous CR status (before this label was added)
            const previousCRLabel = currentLabels.find(l => CR_LABELS.includes(l) && l !== label);

            // ── Authorization check — only approvers can add restricted labels ──
            if (APPROVER_ONLY.includes(label) && !AUTHORIZED_USERS.includes(actor)) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                name: label
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `⛔ @${actor} you are not authorized to add the \`${label}\` label.\n\nAuthorized approvers: ${AUTHORIZED_USERS.map(u => '@' + u).join(', ')}`
              });
              return;
            }

            // ── Block non-consecutive and backward transitions (for everyone) ──
            const newIndex = FORWARD_ORDER.indexOf(label);
            const prevIndex = FORWARD_ORDER.indexOf(previousCRLabel);

            if (newIndex !== -1 && prevIndex !== -1 && newIndex !== prevIndex + 1) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                name: label
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `⛔ @${actor} Invalid transition \`${previousCRLabel}\` → \`${label}\` is not allowed.\n\nYou can only move to the next step:\n- \`CR:New\` → \`CR:Approved\`\n- \`CR:Approved\` → \`CR:In Progress\`\n- \`CR:In Progress\` → \`CR:Done\`\n- \`CR:Done\` → \`CR:Deployed\`\n\nTo pause at any stage use \`CR:Hold\`.`
              });
              return;
            }

            // ── Block re-approval ──
            if (label === 'CR:Approved') {
              const comments = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber
              });
              const alreadyApproved = comments.data.some(c => c.body.includes('CR Approved') && c.body.includes('Approved By'));
              if (alreadyApproved) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  name: label
                });
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  body: `⛔ This CR is already approved. Re-approval is not allowed.\n\nIf further changes are needed, raise a new Change Request.`
                });
                return;
              }

              // ── Require "Approved By: <name>" comment before approving ──
              const approvedByComment = [...comments.data].reverse().find(c =>
                /approved by\s*:\s*.+/i.test(c.body) && !c.body.includes('CR Approved')
              );
              if (!approvedByComment) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  name: label
                });
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  body: `⛔ @${actor} Cannot approve without specifying who approved this CR.\n\nPlease add a comment in this format first:\n\n\`\`\`\nApproved By: Manager Name\n\`\`\`\n\nThen add the \`CR:Approved\` label again.`
                });
                return;
              }

              const approverMatch = approvedByComment.body.match(/approved by\s*:\s*(.+)/i);
              const approverName = approverMatch ? approverMatch[1].trim() : 'Unknown';

              // Valid approval — remove CR:New, post approval comment
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  name: 'CR:New'
                });
              } catch (e) {}

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `✅ **CR Approved**\n\n| Field | Value |\n|-------|-------|\n| **Approved By** | ${approverName} |\n| **Approval Date** | ${now} |\n| **Approved On GitHub By** | @${actor} |\n| **Issue** | ${issueTitle} |\n\nThis Change Request is approved for development. A PR must be raised linking to this issue using \`Closes #${issueNumber}\`.`
              });
            }

            // ── Remove all other CR labels — only 1 status allowed at a time ──
            for (const l of CR_LABELS) {
              if (l !== label) {
                try {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNumber,
                    name: l
                  });
                } catch (e) {}
              }
            }

            // ── CR:Hold ──
            if (label === 'CR:Hold') {
              try {
                if (previousCRLabel) {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNumber,
                    name: previousCRLabel
                  });
                }
              } catch (e) {}

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `⏸️ **CR On Hold**\n\n| Field | Value |\n|-------|-------|\n| **Put On Hold By** | @${actor} |\n| **Date** | ${now} |\n| **Previous Status** | \`${previousCRLabel || 'CR:New'}\` |\n\nTo resume, add the label \`${previousCRLabel || 'CR:New'}\` back.`
              });
            }

            // ── CR:Rejected ──
            if (label === 'CR:Rejected') {
              for (const l of ['CR:New', 'CR:Approved', 'CR:In Progress', 'CR:Hold']) {
                try {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNumber,
                    name: l
                  });
                } catch (e) {}
              }
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `❌ **CR Rejected**\n\n| Field | Value |\n|-------|-------|\n| **Rejected By** | @${actor} |\n| **Rejection Date** | ${now} |\n| **Issue** | ${issueTitle} |\n\nThis Change Request has been rejected. No development should proceed.`
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                state: 'closed'
              });
            }
