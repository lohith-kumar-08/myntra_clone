name: CR Approval Control

on:
  issues:
    types: [labeled, unlabeled]

jobs:
  handle-cr-label:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Handle CR Label Changes
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const AUTHORIZED_USERS = ['lohith-kumar-08'];
            const CR_LABELS = ['CR:New', 'CR:Approved', 'CR:In Progress', 'CR:Done', 'CR:Deployed', 'CR:Hold', 'CR:Rejected'];
            const FORWARD_ORDER = ['CR:New', 'CR:Approved', 'CR:In Progress', 'CR:Done', 'CR:Deployed'];

            const actor = context.payload.sender.login;
            const label = context.payload.label.name;
            const issueNumber = context.payload.issue.number;
            const issueTitle = context.payload.issue.title;
            const now = new Date().toISOString().split('T')[0];

            // Only handle CR labels
            if (!CR_LABELS.includes(label)) return;

            // ── Block unauthorized removal of CR:Approved, CR:Done, CR:Deployed ──
            const protectedLabels = ['CR:Approved', 'CR:In Progress', 'CR:Done', 'CR:Deployed'];
            if (context.payload.action === 'unlabeled' && protectedLabels.includes(label)) {
              if (!AUTHORIZED_USERS.includes(actor)) {
                // Re-add the removed label
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  labels: [label]
                });
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  body: `⛔ @${actor} you are not authorized to remove the \`${label}\` label.\n\nThe label has been restored.\n\nAuthorized approvers: ${AUTHORIZED_USERS.map(u => '@' + u).join(', ')}`
                });
                return;
              }
              // Authorized user removing a protected label — check it's not a backward transition
              const newCurrentLabels = issueData.data.labels.map(l => l.name).filter(l => l !== label);
              const newCRLabel = newCurrentLabels.find(l => CR_LABELS.includes(l));
              const removedIndex = FORWARD_ORDER.indexOf(label);
              const newLabelIndex = FORWARD_ORDER.indexOf(newCRLabel);
              if (newCRLabel && newLabelIndex < removedIndex) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  labels: [label]
                });
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  body: `⛔ Backward transition not allowed: cannot go from \`${label}\` to \`${newCRLabel}\`.\n\nStatus restored to \`${label}\`.\n\nTo pause a CR at any stage, use \`CR:Hold\`.`
                });
              }
              return;
            }

            // Skip further processing for unlabeled events
            if (context.payload.action === 'unlabeled') return;

            // Get current issue labels
            const issueData = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber
            });
            const currentLabels = issueData.data.labels.map(l => l.name);
            const previousCRLabel = currentLabels.find(l => CR_LABELS.includes(l) && l !== label) || 'CR:New';

            // ── Authorization check (for Approved, Rejected, Hold only) ──
            const restrictedLabels = ['CR:Approved', 'CR:Rejected', 'CR:Hold'];
            if (restrictedLabels.includes(label) && !AUTHORIZED_USERS.includes(actor)) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                name: label
              });
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: [previousCRLabel]
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `⛔ @${actor} you are not authorized to perform this action.\n\nThe \`${label}\` label has been removed and status restored to \`${previousCRLabel}\`.\n\nAuthorized approvers: ${AUTHORIZED_USERS.map(u => '@' + u).join(', ')}`
              });
              return;
            }

            // ── Block backward transitions ──
            const newIndex = FORWARD_ORDER.indexOf(label);
            const prevIndex = FORWARD_ORDER.indexOf(previousCRLabel);

            if (newIndex !== -1 && prevIndex !== -1 && newIndex < prevIndex && label !== 'CR:Hold') {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                name: label
              });
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: [previousCRLabel]
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `⛔ Invalid status transition: \`${previousCRLabel}\` → \`${label}\` is not allowed.\n\nStatus restored to \`${previousCRLabel}\`.\n\nAllowed flow: CR:New → CR:Approved → CR:In Progress → CR:Done → CR:Deployed\n\nTo pause a CR at any stage, use \`CR:Hold\`.`
              });
              return;
            }

            // ── Block re-approval if already approved ──
            if (label === 'CR:Approved') {
              const comments = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber
              });
              const alreadyApproved = comments.data.some(c => c.body.includes('CR Approved') && c.body.includes('Approved By'));
              if (alreadyApproved) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  body: `⛔ This CR is already approved. Re-approval is not allowed.\n\nIf you need to make further changes, please raise a new Change Request.`
                });
                return;
              }

              // Remove CR:New
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  name: 'CR:New'
                });
              } catch (e) {}

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `✅ **CR Approved**\n\n| Field | Value |\n|-------|-------|\n| **Approved By** | @${actor} |\n| **Approval Date** | ${now} |\n| **Issue** | ${issueTitle} |\n\nThis Change Request is approved for development. A PR must be raised linking to this issue using \`Closes #${issueNumber}\`.`
              });
            }

            // ── CR:Hold — store previous status in comment ──
            else if (label === 'CR:Hold') {
              // Remove previous CR label
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  name: previousCRLabel
                });
              } catch (e) {}

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `⏸️ **CR On Hold**\n\n| Field | Value |\n|-------|-------|\n| **Put On Hold By** | @${actor} |\n| **Date** | ${now} |\n| **Previous Status** | \`${previousCRLabel}\` |\n\nTo resume, add the label \`${previousCRLabel}\` back.`
              });
            }

            // ── CR:Rejected ──
            else if (label === 'CR:Rejected') {
              for (const l of ['CR:New', 'CR:Approved', 'CR:In Progress', 'CR:Hold']) {
                try {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNumber,
                    name: l
                  });
                } catch (e) {}
              }
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `❌ **CR Rejected**\n\n| Field | Value |\n|-------|-------|\n| **Rejected By** | @${actor} |\n| **Rejection Date** | ${now} |\n| **Issue** | ${issueTitle} |\n\nThis Change Request has been rejected. No development should proceed.`
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                state: 'closed'
              });
            }
